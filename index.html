<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katty-Gotchi - Control Veterinario</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b81;
            --shell-dark: #ff4757;
            --screen-normal: #9bbc0f; 
            --screen-alert: #f1c40f;  
            --screen-danger: #e74c3c; 
            --dark: #2c3e50;
            --success: #2ecc71;
            --med-blue: #3498db;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f3f2;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .tamagotchi-shell {
            background: var(--primary);
            width: 100%;
            max-width: 500px;
            border-radius: 50px;
            padding: 25px;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.2), 10px 15px 30px rgba(0,0,0,0.3);
            border: 5px solid var(--shell-dark);
            box-sizing: border-box;
        }

        .screen-bezel {
            background: #cbd5e0;
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
        }

        .lcd-screen {
            background: var(--screen-normal);
            border: 4px solid #2d3436;
            border-radius: 12px;
            padding: 15px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            color: #2d3436;
            text-align: center;
            transition: background-color 0.3s;
        }

        .pet-character { font-size: 55px; line-height: 1; }
        .pet-status { font-size: 22px; text-transform: uppercase; font-weight: bold; }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .admin-section {
            background: #f8fafc;
            border: 2px solid #edf2f7;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .form-row { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; }
        input, select {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-add {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--shell-dark);
            margin-bottom: 10px;
        }

        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--shell-dark); }

        .history-container { overflow-x: auto; margin-top: 15px;}
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }

        .btn-delete { color: #e74c3c; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<div id="app-content">
    <div class="tamagotchi-shell">
        <div class="screen-bezel">
            <div class="lcd-screen">
                <div class="pet-character" id="petAnim">( ᴗ ˕ ᴗ ) 💤</div>
                <div class="pet-status" id="statusLabel">KATTY-GOTCHI</div>
                <div id="rpmDisplay" style="margin-top:5px; opacity:0.7;">LISTO PARA REGISTRO</div>
            </div>
        </div>

        <div class="control-panel">
            <div class="admin-section">
                <h4 style="margin-top:0; font-size:12px; color:#64748b;">NUEVA OPCIÓN</h4>
                <div class="form-row">
                    <input type="text" id="medName" placeholder="Nombre (ej. Omega 3)">
                    <select id="medIcon">
                        <option value="💊">💊 Cápsula</option>
                        <option value="💧">💧 Gotas</option>
                        <option value="💉">💉 Inyección</option>
                    </select>
                </div>
                <button class="btn-add" id="btnAddMed">+ Agregar al Inventario</button>
            </div>

            <div class="form-row">
                <input type="number" id="rpmInput" placeholder="RPM actual (Frecuencia)">
                <input type="text" id="treatInput" placeholder="Medicamento aplicado">
            </div>

            <button class="btn-main" id="btnProcess">REGISTRAR EN FIREBASE</button>

            <div class="history-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>RPM</th>
                            <th>Med</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- CONFIGURACIÓN DE FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAvfhqvaklMrCtqHrQ-CaO2onzo1uWUcwY",
        authDomain: "dog-esponja-dosis.firebaseapp.com",
        projectId: "dog-esponja-dosis",
        storageBucket: "dog-esponja-dosis.firebasestorage.app",
        messagingSenderId: "1079495320208",
        appId: "1:1079495320208:web:ddef3358ddfa36696eae15"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- FUNCIONES DE SONIDO Y REACCIÓN ---
    const playBeep = (f, d) => {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        const g = a.createGain();
        o.type = "square"; o.frequency.value = f;
        g.gain.value = 0.1; o.connect(g); g.connect(a.destination);
        o.start(); o.stop(a.currentTime + d);
    };

    const doReaction = (msg = "¡GLUP! GUARDADO") => {
        const pet = document.getElementById('petAnim');
        const screen = document.querySelector('.lcd-screen');
        const status = document.getElementById('statusLabel');
        
        playBeep(900, 0.1); 
        setTimeout(() => playBeep(1200, 0.1), 100);
        
        pet.innerText = "( > ᴗ < ) ✨";
        status.innerText = msg;
        screen.style.backgroundColor = "#f1c40f"; 
        
        setTimeout(() => {
            pet.innerText = "( ᴗ ˕ ᴗ ) 💤";
            status.innerText = "KATTY-GOTCHI";
            screen.style.backgroundColor = "#9bbc0f";
        }, 2500);
    };

    // --- EVENTOS ---

    document.getElementById('btnAddMed').onclick = async () => {
        const name = document.getElementById('medName').value;
        if(!name) return alert("Escribe el nombre");
        
        try {
            await addDoc(collection(db, "medications"), { 
                nombre: name, 
                icono: document.getElementById('medIcon').value,
                creado: serverTimestamp()
            });
            doReaction("MEDICINA AGREGADA");
            document.getElementById('medName').value = "";
        } catch (e) { console.error(e); }
    };

    document.getElementById('btnProcess').onclick = async () => {
        const rpm = document.getElementById('rpmInput').value || "0";
        const med = document.getElementById('treatInput').value || "Dosis";
        
        try {
            await addDoc(collection(db, "treatments"), {
                rpm: rpm,
                tratamiento: med,
                fecha: new Date().toLocaleString('es-MX'),
                timestamp: serverTimestamp()
            });
            doReaction();
            document.getElementById('rpmInput').value = "";
            document.getElementById('treatInput').value = "";
        } catch (e) { console.error(e); }
    };

    const q = query(collection(db, "treatments"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const body = document.getElementById('historyBody');
        body.innerHTML = "";
        snap.forEach((doc) => {
            const d = doc.data();
            body.innerHTML += `
                <tr>
                    <td>${d.fecha || '---'}</td>
                    <td><b>${d.rpm}</b></td>
                    <td>${d.tratamiento}</td>
                    <td><button class="btn-delete" onclick="window.deleteRecord('${doc.id}')">🗑️</button></td>
                </tr>`;
        });
    });

    window.deleteRecord = async (id) => {
        if(confirm("¿Borrar registro?")) {
            await deleteDoc(doc(db, "treatments", id));
            playBeep(300, 0.2);
        }
    };
</script>
</body>
</html>
