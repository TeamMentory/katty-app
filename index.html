<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katty-Gotchi - Control Veterinario</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b81;
            --shell-dark: #ff4757;
            --screen-normal: #9bbc0f; 
            --screen-alert: #f1c40f;  
            --screen-danger: #e74c3c; 
            --dark: #2c3e50;
            --success: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f3f2;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .tamagotchi-shell {
            background: var(--primary);
            width: 100%;
            max-width: 500px;
            border-radius: 50px;
            padding: 25px;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.2), 10px 15px 30px rgba(0,0,0,0.3);
            border: 5px solid var(--shell-dark);
            box-sizing: border-box;
        }

        .screen-bezel {
            background: #cbd5e0;
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
        }

        .lcd-screen {
            background: var(--screen-normal);
            border: 4px solid #2d3436;
            border-radius: 12px;
            padding: 15px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            color: #2d3436;
            text-align: center;
            transition: all 0.3s ease;
        }

        .pet-character { font-size: 55px; line-height: 1; }
        .pet-status { font-size: 22px; text-transform: uppercase; font-weight: bold; }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-row { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; }
        input, select {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--shell-dark);
            margin-bottom: 10px;
            transition: all 0.1s;
        }

        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--shell-dark); }

        .history-container { overflow-x: auto; margin-top: 15px; max-height: 200px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #f1f5f9; position: sticky; top: 0; background: white; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9em;
            display: inline-block;
        }
        .status-ok { background-color: #d4efdf; color: #27ae60; }
        .status-vigilar { background-color: #fcf3cf; color: #d35400; }
        .status-alerta { background-color: #fadbd8; color: #c0392b; }

        .btn-delete { color: #e74c3c; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<div class="tamagotchi-shell">
    <div class="screen-bezel">
        <div class="lcd-screen" id="lcdScreen">
            <div class="pet-character" id="petAnim">( ᴗ ˕ ᴗ ) 💤</div>
            <div class="pet-status" id="statusLabel">KATTY-GOTCHI</div>
            <div id="rpmDisplay" style="margin-top:5px; opacity:0.7;">LISTO PARA REGISTRO</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="form-row">
            <input type="number" id="rpmInput" placeholder="RPM actual">
            <select id="treatIcon" style="max-width: 80px;">
                <option value="💊">💊</option>
                <option value="💧">💧</option>
                <option value="💉">💉</option>
            </select>
            <input type="text" id="treatInput" placeholder="Medicamento">
        </div>

        <button class="btn-main" id="btnProcess">REGISTRO Y DAR</button>

        <div class="history-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>RPM</th>
                        <th>Med</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- REEMPLAZA CON TUS CREDENCIALES ---
    const firebaseConfig = {
        apiKey: "AIzaSyAvfhqvaklMrCtqHrQ-CaO2onzo1uWUcwY",
        authDomain: "dog-esponja-dosis.firebaseapp.com",
        projectId: "dog-esponja-dosis",
        storageBucket: "dog-esponja-dosis.firebasestorage.app",
        messagingSenderId: "1079495320208",
        appId: "1:1079495320208:web:ddef3358ddfa36696eae15"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const playBeep = (f, d) => {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        const g = a.createGain();
        o.type = "square"; o.frequency.value = f;
        g.gain.value = 0.1; o.connect(g); g.connect(a.destination);
        o.start(); o.stop(a.currentTime + d);
    };

    const updateHealthStatus = (rpm) => {
        const pet = document.getElementById('petAnim');
        const screen = document.getElementById('lcdScreen');
        const status = document.getElementById('statusLabel');
        const display = document.getElementById('rpmDisplay');

        let color = "#9bbc0f"; 
        let msg = "REGISTRADO";
        let face = "( > ᴗ < ) ✨";

        if (rpm > 40) {
            color = "#e74c3c";
            msg = "URGENTE";
            face = "( • ᵜ • ) ❗";
            playBeep(200, 0.5);
        } else if (rpm >= 30) {
            color = "#f1c40f";
            msg = "VIGILAR";
            face = "( ʘ ‿ ʘ ) 🔍";
            playBeep(600, 0.2);
        } else {
            playBeep(900, 0.1);
        }

        screen.style.backgroundColor = color;
        status.innerText = msg;
        pet.innerText = face;
        display.innerText = `RPM: ${rpm}`;

        setTimeout(() => {
            pet.innerText = "( ᴗ ˕ ᴗ ) 💤";
            status.innerText = "KATTY-GOTCHI";
            screen.style.backgroundColor = "#9bbc0f";
            display.innerText = "LISTO PARA REGISTRO";
        }, 4000);
    };

    document.getElementById('btnProcess').onclick = async () => {
        const rpmVal = document.getElementById('rpmInput').value;
        const rpm = parseInt(rpmVal) || 0;
        const treatText = document.getElementById('treatInput').value || "Sin med.";
        const treatIcon = document.getElementById('treatIcon').value;
        const med = `${treatIcon} ${treatText}`;
        
        if(!rpmVal) return alert("Por favor ingresa las RPM.");

        // OPTIMIZACIÓN: Disparar la respuesta visual de inmediato
        updateHealthStatus(rpm);
        
        // Limpiar campos rápido
        document.getElementById('rpmInput').value = "";
        document.getElementById('treatInput').value = "";

        // Guardar en segundo plano
        try {
            await addDoc(collection(db, "treatments"), {
                rpm: rpm,
                tratamiento: med,
                fecha: new Date().toLocaleString('es-MX'),
                timestamp: serverTimestamp()
            });
        } catch (e) { console.error("Error al guardar:", e); }
    };

    const q = query(collection(db, "treatments"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const body = document.getElementById('historyBody');
        body.innerHTML = "";
        snap.forEach((docSnap) => {
            const d = docSnap.data();
            let stClass = "status-ok", stText = "OK";
            if (d.rpm > 40) { stClass = "status-alerta"; stText = "ALERTA"; }
            else if (d.rpm >= 30) { stClass = "status-vigilar"; stText = "VIGILAR"; }

            body.innerHTML += `
                <tr>
                    <td>${d.fecha || '---'}</td>
                    <td><b>${d.rpm}</b></td>
                    <td>${d.tratamiento}</td>
                    <td><span class="status-badge ${stClass}">${stText}</span></td>
                    <td><button class="btn-delete" onclick="window.deleteRecord('${docSnap.id}')">🗑️</button></td>
                </tr>`;
        });
    });

    window.deleteRecord = async (id) => {
        if(confirm("¿Borrar registro?")) {
            await deleteDoc(doc(db, "treatments", id));
            playBeep(300, 0.2);
        }
    };
</script>
</body>
</html>
